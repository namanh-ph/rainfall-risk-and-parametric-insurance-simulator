services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: simulator_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - simulator_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simulator_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./reports:/reports
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - simulator_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simulator_frontend
    env_file:
      - .env
    environment:
      # Canonical /api/v1 prefix — the React app only consumes versioned routes.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-${FRONTEND_API_BASE_URL}}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - simulator_net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: simulator_mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT}
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/').status<500 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - simulator_net

volumes:
  postgres_data:
  mlflow_data:
  frontend_node_modules:

networks:
  simulator_net:
    driver: bridge
